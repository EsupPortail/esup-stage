<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://primefaces.org/html"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">
        #{msg['convention.title']}
    </ui:define>

    <ui:define name="description">
        #{msg['convention.description']}
    </ui:define>

    <ui:define name="body">

        <div class="ui-fluid">
            <p:tabView id="tabs" dynamic="true">
                <p:tab title="Indications" disabled="false">
                    <h:form>
                        <h:panelGrid columns="2" cellpadding="7" styleClass="p-mb-3">
                            <h:outputText value="test"/>
                        </h:panelGrid>
                        <p:commandButton value="Submit" update="tabs" action="updateStructure" icon="pi pi-check"/>
                    </h:form>
                </p:tab>
                <p:tab title="Etudiant" disabled="false">
                </p:tab>
                <p:tab title="Etablissement d'accueil" disabled="false">
                    <h:form>
                        <h2>#{msg['convention.general']}</h2>
                        <h:panelGrid columns="2" cellpadding="7" styleClass="p-mb-3">

                            <div class="p-field p-grid">
                                <label for="raisonSociale" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.social_reason']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="raisonSociale" type="text" value="#{structureCreationView.raisonSociale}">
                                           <f:validateLength minimum="10"/>
                                           <p:ajax update="msgRaisonSociale" event="keyup" global="false"/>
                                    </p:inputText>
                                    <p:message for="raisonSociale" id="msgRaisonSociale" display="icon"/>

                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="numeroSiret" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.siret_number']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="numeroSiret" type="text" value="#{structureCreationView.numeroSiret}">
                                        <f:validateLength minimum="10" maximum="20"/>
                                        <p:clientValidator/>
                                    </p:inputText>
                                    <p:message for="numeroSiret" display="icon"/>

                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="effectif" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.effective']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:selectOneMenu id="effectif" value="#{structureCreationView.effectif}" style="width:12rem">
                                        <f:selectItem itemLabel=" #{msg['convention.structure.select_effective']}" itemValue="" noSelectionOption="true"/>
                                        <f:selectItems value="#{structureCreationView.effectifs}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="typeEtab" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.establishment_type']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:selectOneMenu id="typeEtab" value="#{structureCreationView.typeStructure}" style="width:12rem">
                                        <f:selectItem itemLabel="#{msg['convention.select_structure_type']}" itemValue="" noSelectionOption="true"/>
                                        <f:selectItems value="#{structureCreationView.typesStructure}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <h2>#{msg['convention.activity']}</h2>
                            <div class="p-field p-grid">
                                <label for="codeAPE" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.ape_code']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="codeAPE" type="text" value="#{structureCreationView.codeAPE}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="activite" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">Activité principale</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="activite" type="text" value="#{structureCreationView.activite}"/>
                                </div>
                            </div>

                            <h2>#{msg['convention.contact_information']}</h2>
                            <div class="p-field p-grid">
                                <label for="voie" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.way']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="voie" type="text" value="#{structureCreationView.voie}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="codePostal" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.postal_code']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="codePostal" type="text" value="#{structureCreationView.codePostal}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="batiment" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.building']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="batiment" type="text" value="#{structureCreationView.batiment}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="commune" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.commune']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="commune" type="text" value="#{structureCreationView.commune}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="cedex" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.cedex']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="cedex" type="text" value="#{structureCreationView.cedex}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="pays" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.country']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:selectOneMenu id="pays" value="#{structureCreationView.pays}" style="width:12rem">
                                        <f:selectItem itemLabel="#{msg['convention.select_a_country']}" itemValue="" noSelectionOption="true"/>
                                        <f:selectItems value="#{structureCreationView.paysList}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>
                            <p:separator/>
                            <div class="p-field p-grid">
                                <label for="email" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.mail']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="email" type="text" value="#{structureCreationView.email}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="phone" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.phone']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="phone" type="text" value="#{structureCreationView.phone}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="website" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.website']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="website" type="text" value="#{structureCreationView.website}"/>
                                </div>
                            </div>
                            <div class="p-field p-grid">
                                <label for="fax" class="p-col-12 p-mb-2 p-md-2 p-mb-md-0">#{msg['convention.fax']}</label>
                                <div class="p-col-12 p-md-10">
                                    <p:inputText id="fax" type="text" value="#{structureCreationView.fax}"/>
                                </div>
                            </div>
                        </h:panelGrid>
                        <p:commandButton value="Créer" update="tabs" action="#{structureCreationView.submitForm}" icon="pi pi-check">
                            <f:ajax render="tab3"/>
                        </p:commandButton>
                    </h:form>
                </p:tab>
                <p:tab title="#{msg['convention.nav.service']}" disabled="false">
                </p:tab>
                <p:tab title="#{msg['convention.nav.tutor']}" disabled="false">
                </p:tab>
                <p:tab title="#{msg['convention.nav.stage']}" disabled="false">
                </p:tab>
                <p:tab title="#{msg['convention.nav.teacher']}" disabled="false">
                </p:tab>
                <p:tab title="#{msg['convention.nav.signator']}" disabled="false">
                </p:tab>

            </p:tabView>
        </div>

    </ui:define>

</ui:composition>
