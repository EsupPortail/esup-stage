              - column:
                  name: idConvention
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: idDocumentEtudiant
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: nomDocument
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: nomReel
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: contentType
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: taille
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sha256
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: loginDepot
