databaseChangeLog:
  - changeSet:
      id: 3.2.0-fix-contrat-offre-modifiable
      author: thouveno9
      comment: "Rendre modifiables les nomenclatures initialisées sans valeur explicite de modifiable"
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: ContratOffre
        - columnExists:
            tableName: ContratOffre
            columnName: modifiable
      changes:
        - update:
            tableName: ContratOffre
            columns:
              - column:
                  name: modifiable
                  valueBoolean: true
            where: "modifiable IS NULL OR modifiable = 0"

