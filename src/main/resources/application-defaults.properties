# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# proprietes du projet
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
application.name=${project.name}
application.version=${project.version}
application.stage=${application.stage}
application.project_url=${project.url}
application.suffix_url=/frontend/#/

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# proprietes de configuration (voir profil dans pom.xml)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
application.configfilepath=${application.configfilepath}

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# proprietes fixes de spring
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.error.whitelabel.enabled=false
server.error.path=/error
spring.mvc.view.suffix=.html

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# proprietes openapi
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
springdoc.api-docs.path=/public/api-docs
springdoc.packages-to-scan=org.esup_portail.esup_stage.controller.apipublic
springdoc.swagger-ui.path=/public/swagger-ui.html

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# proprietes webclient memory size
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
spring.codec.max-in-memory-size=5MB

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# log file configuration
# Local default: ./logs/esup-stage.log
# Docker override: ESUP_STAGE_LOG_DIR=/usr/local/tomcat/data/logs
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
appli.logs_dir=${ESUP_STAGE_LOG_DIR:logs}
logging.file.name=${ESUP_STAGE_LOG_FILE:${appli.logs_dir}/esup-stage.log}
logging.file.max-size=${ESUP_STAGE_LOG_MAX_SIZE:50MB}
logging.file.max-history=${ESUP_STAGE_LOG_MAX_HISTORY:30}
logging.charset.file=UTF-8
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE}.%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.total-size-cap=2GB