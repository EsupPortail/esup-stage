<div class="log-viewer" *ngIf="currentFile as activeFile; else noFile">
  <h2 mat-dialog-title class="dialog-header" *ngIf="isDialogMode">
    <span class="dialog-header-left">
      <mat-icon class="dialog-header-icon">description</mat-icon>
      <span class="dialog-title-group">
        <span class="dialog-title-text">Lecture du log</span>
        <span class="dialog-subtitle-text">{{ activeFile.name }}<ng-container *ngIf="activeFile.lastModified"> - {{ activeFile.lastModified | date:'dd/MM/yyyy' }}</ng-container></span>
      </span>
    </span>

    <button
      mat-icon-button
      class="dialog-close-button"
      type="button"
      (click)="closeDialog()"
      aria-label="Fermer la lecture du log">
      <mat-icon>close</mat-icon>
    </button>
  </h2>

  <div mat-dialog-content class="log-viewer__content" [class.log-viewer__content--dialog]="isDialogMode">
    <app-logs-display
      [lines]="coreLines"
      [loading]="loading"
      [showLineNumbers]="showLineNumbers"
      [wrapLines]="wrapLines"
      [page]="page"
      [totalPages]="totalPages"
      [totalLines]="totalLines"
      [pageSize]="currentPageSize"
      (pageChange)="$event === 'prev' ? prevPage() : nextPage()">

      <!-- Le bouton export reste spécifique à ce composant -->
      <div slot="actions">
        <button mat-icon-button type="button"
                [matMenuTriggerFor]="exportMenu" matTooltip="Exporter ce fichier">
          <mat-icon>download</mat-icon>
        </button>
        <mat-menu #exportMenu="matMenu">
          <button mat-menu-item (click)="export('original')">...</button>
          <button mat-menu-item (click)="export('csv')">...</button>
        </mat-menu>
      </div>
    </app-logs-display>
  </div>
</div>

<ng-template #noFile>
  <div class="no-file-placeholder">
    <mat-icon>article</mat-icon>
    <h3>Selectionnez un fichier de log</h3>
    <p>Cliquez sur un fichier dans l'explorateur pour l'ouvrir ici.</p>
  </div>
</ng-template>
