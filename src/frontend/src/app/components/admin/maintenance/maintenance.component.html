<div class="maintenance-toolbar">
  <button class="valid-button" mat-flat-button (click)="openCreateDialog()">
    <span class="fa fa-plus mr-1" aria-hidden="true"></span>
    Créer une maintenance
  </button>
</div>

<app-table
  #appTable
  [service]="maintenanceService"
  [columns]="columns"
  [sortColumn]="sortColumn"
  [filters]="filters"
  [sortOrder]="sortDirection"
  matSort
  [matSortActive]="sortColumn"
  [matSortDirection]="sortDirection"
  (matSortChange)="appTable ? appTable.sorting($event) : null"
>
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="datDebMaint">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Début</th>
    <td mat-cell *matCellDef="let row">{{ formatMaintenanceDate(row.datDebMaint) }}</td>
  </ng-container>

  <ng-container matColumnDef="datFinMaint">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Fin</th>
    <td mat-cell *matCellDef="let row">{{ formatMaintenanceDate(row.datFinMaint) }}</td>
  </ng-container>

  <ng-container matColumnDef="datAlertMaint">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Alerte</th>
    <td mat-cell *matCellDef="let row">{{ formatMaintenanceDate(row.datAlertMaint) }}</td>
  </ng-container>

  <ng-container matColumnDef="message">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Message</th>
    <td mat-cell *matCellDef="let row">{{ row.message || '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="createdBy">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Créé par</th>
    <td mat-cell *matCellDef="let row">{{ row.createdBy }}</td>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Créé le</th>
    <td mat-cell *matCellDef="let row">{{ formatMaintenanceDate(row.createdAt) }}</td>
  </ng-container>

  <ng-container matColumnDef="action">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let row" class="actions-cell">
      <button
        class="edit-button"
        mat-icon-button
        matTooltip="Modifier"
        (click)="openEditDialog(row)"
      >
        <span class="fa fa-edit" aria-label="Modifier"></span>
      </button>

      <button
        class="maintenance-action-button edit-button"
        mat-icon-button
        [matTooltip]="isActive(row) ? 'Désactiver' : 'Activer'"
        (click)="isActive(row) ? deactivate(row) : activate(row)"
      >
        <span class="fa" [ngClass]="isActive(row) ? 'fa-pause' : 'fa-play'" aria-label="Action maintenance"></span>
      </button>

      <span (confirm)="delete(row)" [confirmMessage]="'Êtes-vous sûr de vouloir supprimer cette maintenance ?'">
        <button class="delete-button" mat-icon-button matTooltip="Supprimer">
          <span class="fa fa-trash-alt" aria-label="Supprimer"></span>
        </button>
      </span>
    </td>
  </ng-container>
</app-table>
