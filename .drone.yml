---
kind: pipeline
type: docker
name: CI

steps:
- name: build-test
  user: root
  image: maven:3-openjdk-11-slim
  commands:
  - mvn install -DskipTests=true -Dmaven.javadoc.skip=true -B -V
  - mvn test -B

- name: Publish
  image: plugins/docker
  settings:
    username: admin
    password: esupstage
    repo: esupstage-registry.parisnanterre.fr/drone/esupstage
    registry: esupstage-registry.parisnanterre.fr
    dockerfile: ./Dockerdrone
    tags:
      - ${DRONE_COMMIT_BRANCH}
      - latest
    
---
kind: pipeline
type: exec
name: CICD
depends_on:
  - CI
trigger:
  status:
    - success

platform:
  os: linux
  arch: amd64

steps:
  - name: compose
    commands:
      - cd /opt/docker-compose-projects/drone/esup-stage
      - docker-compose pull
      - docker-compose  up -d --remove-orphans
      
trigger:
  branch:
  - dev
